<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERCP | Empire City RP</title>

<style>
:root{
  --bg:#0f172a;
  --card:#020617;
  --accent:#38bdf8;
  --text:#fff;
}

body.light{
  --bg:#f1f5f9;
  --card:#fff;
  --accent:#0ea5e9;
  --text:#0f172a;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header{
  text-align:center;
  padding:20px;
  border-bottom:2px solid var(--accent);
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--accent);
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

button{
  padding:10px;
  margin:5px 5px 5px 0;
  border:none;
  border-radius:6px;
  background:var(--accent);
  cursor:pointer;
}

.badge{
  padding:3px 8px;
  border-radius:5px;
  font-size:12px;
}

.pending{background:orange;color:black}
.accepted{background:green;color:white}
.denied{background:red;color:white}
</style>
</head>

<body>

<header>
<h1>ERCP | Empire City RP</h1>
</header>

<div class="container">

<button onclick="toggleTheme()">Toggle Theme</button>

<div class="card">
<h2>Application</h2>
<input id="name" placeholder="Discord Username">
<textarea id="reason" placeholder="Why join?"></textarea>
<button onclick="submitApp()">Submit</button>
</div>

<div class="card">
<h2>Admin Login</h2>
<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="status"></p>

<div id="panel" style="display:none">
<h3>Applications</h3>
<div id="apps"></div>
</div>

</div>

</div>

<script>
let apps = JSON.parse(localStorage.getItem("apps") || "[]");

function submitApp(){
  const n = document.getElementById("name").value;
  const r = document.getElementById("reason").value;

  if(!n || !r) return alert("Fill everything");

  apps.push({id:Date.now(),name:n,reason:r,status:"pending"});
  localStorage.setItem("apps", JSON.stringify(apps));

  alert("Submitted!");
}

function login(){
  const u = adminUser.value;
  const p = adminPass.value;

  if(u==="admin" && p==="1234"){
    status.innerText="Logged in";
    panel.style.display="block";
    loadApps();
  } else {
    status.innerText="Wrong login";
  }
}

function loadApps(){
  const box = document.getElementById("apps");
  box.innerHTML="";

  apps.forEach(a=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${a.name}</b>
      <p>${a.reason}</p>
      <span class="badge ${a.status}">${a.status}</span><br>
      <button onclick="update(${a.id},'accepted')">Accept</button>
      <button onclick="update(${a.id},'denied')">Deny</button>
    `;

    box.appendChild(div);
  });
}

function update(id,status){
  apps = apps.map(a=>{
    if(a.id===id) a.status=status;
    return a;
  });

  localStorage.setItem("apps", JSON.stringify(apps));
  loadApps();
}

function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
